name: Release Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-assets:
    name: Verify ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build verification asset
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build \
              -trimpath \
              -ldflags "-s -w -X dockbridge/internal/command.defaultVersion=verify-build" \
              -o dist/dockerbridge \
              ./cmd/dockerbridge
          chmod +x dist/dockerbridge
          tar -czf "dist/dockerbridge_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" -C dist dockerbridge

      - name: Upload verification asset
        uses: actions/upload-artifact@v4
        with:
          name: dockerbridge_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/dockerbridge_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  verify-shape:
    name: Verify artifact names and test suite
    runs-on: ubuntu-latest
    needs:
      - build-assets
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download verification assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dockerbridge_*
          merge-multiple: true

      - name: Assert predictable artifact names
        run: |
          test -f dist/dockerbridge_darwin_amd64.tar.gz
          test -f dist/dockerbridge_darwin_arm64.tar.gz
          test -f dist/dockerbridge_linux_amd64.tar.gz
          test -f dist/dockerbridge_linux_arm64.tar.gz

      - name: Verify onboarding and Go tests
        run: |
          bash -n scripts/onboard-dockbridge.sh
          bash scripts/test-onboard-dockbridge.sh
          go test ./...
